apiVersion: apps/v1
kind: Deployment
metadata:
  name: securitydemo2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: securitydemo2
  template:
    metadata:
      labels:
        app: securitydemo2
    spec:
      serviceAccountName: ksa-cloud-sql # Correct: Matches your KSA
      containers:
        - name: securitydemo2
          # UPDATED: Points to your new Artifact Registry path
          image: us-east1-docker.pkg.dev/regal-hybrid-382815/edutorres-docker-repo/security-demo-2:3.0
          ports:
            - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: securitydemo2-service
spec:
  selector:
    app: securitydemo2
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
  type: LoadBalancer
